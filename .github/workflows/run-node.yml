name: Facebook Auto Post

on:
  workflow_dispatch:

jobs:
  upload_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- نظام الكاش السريع ---
      - name: Cache Node Modules
        id: cache-npm
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}

      - name: Install Dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm install --no-audit --no-fund

      # --- تثبيت المتصفح بطريقة خفيفة ---
      - name: Install Chrome
        run: npx puppeteer browsers install chrome

      - name: Run Facebook Uploader
        env:
          FACEBOOK_COOKIES: ${{ secrets.FACEBOOK_COOKIES }}
        run: node facebook_upload.js

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: facebook-report
          path: |
            facebook-final-check.png
            facebook-error-log.png
